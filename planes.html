    <style>
        body { padding: 0; margin: 0; }

    <div id="map"></div>

        var map = L.map('map').setView([32.4279, 53.6880], 5);
        var CartoDB_DarkMatter = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);
        
        var firLayer = L.geoJSON(null, {
            style: function(feature) {
                var isIran = false;
                if (feature.properties) {
                    var id = feature.properties.id || "";
                    var name = feature.properties.FIRname || "";
                    if (id === "OIIX" || name.indexOf("Tehran") !== -1) {
                        isIran = true;
                    }
                }
                return {
                    color: "#0055ff", 
                    weight: 2, 
                    fillOpacity: isIran ? 0.1 : 0.0
                };
            }
        }).addTo(map);

        fetch('https://raw.githubusercontent.com/vatsimnetwork/vatspy-data-project/master/Boundaries.geojson')
            .then(res => res.json())
            .then(data => firLayer.addData(data));
            
        L.marker([37.85, 44.83], {icon: L.divIcon({className: 'custom-div-icon', html: "<div style='background-color:#ffcc00;width:12px;height:12px;border-radius:50%;border:2px solid #000;'></div>"})}).addTo(map).bindPopup('<b>Flight:</b> TK172');
