<!DOCTYPE html>
<html>
<head>
    <title>Active Aircraft Over OIIX</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { padding: 0; margin: 0; }
        #map { height: 100vh; width: 100vw; }
        .leaflet-container { background: #000; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([32.4279, 53.6880], 5);
        var CartoDB_DarkMatter = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);
        
        var firLayer = L.geoJSON(null, {
            style: function(feature) {
                var isIran = false;
                if (feature.properties) {
                    var id = feature.properties.id || "";
                    var name = feature.properties.FIRname || "";
                    if (id === "OIIX" || name.indexOf("Tehran") !== -1) {
                        isIran = true;
                    }
                }
                return {
                    color: "#0055ff", 
                    weight: 2, 
                    fillOpacity: isIran ? 0.1 : 0.0
                };
            }
        }).addTo(map);

        fetch('https://raw.githubusercontent.com/vatsimnetwork/vatspy-data-project/master/Boundaries.geojson')
            .then(res => res.json())
            .then(data => firLayer.addData(data));
            
        L.marker([37.93, 47.3], {icon: L.divIcon({className: 'custom-div-icon', html: "<div style='background-color:#ffcc00;width:12px;height:12px;border-radius:50%;border:2px solid #000;'></div>"})}).addTo(map).bindPopup('<b>Flight:</b> FZ714');
L.marker([37.76, 50.26], {icon: L.divIcon({className: 'custom-div-icon', html: "<div style='background-color:#ffcc00;width:12px;height:12px;border-radius:50%;border:2px solid #000;'></div>"})}).addTo(map).bindPopup('<b>Flight:</b> 7L9801');
