    <style>
        body { padding: 0; margin: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            z-index: 2000;
            transition: opacity 0.3s;
        }
        
        #top-banner {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        #left-panel {
            position: absolute;
            top: 70px;
            left: 15px;
            width: 250px;
            max-height: 60vh;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            overflow-y: auto;
        }
        
        #left-panel h3 { margin: 0 0 10px 0; font-size: 18px; border-bottom: 1px solid #555; padding-bottom: 5px; }
        #left-panel p { margin: 5px 0; font-size: 14px; }
        #left-panel ul { margin: 10px 0 0 0; padding-left: 20px; font-size: 13px; color: #ddd; }

        #slider-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 25px;
            border-radius: 12px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        #slider-container label { color: white; font-weight: bold; white-space: nowrap; font-size: 14px; }
        input[type=range] { flex-grow: 1; cursor: pointer; }
        
        .plane-tooltip {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 1px solid #fff;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }
        .leaflet-popup-content { font-size: 14px; line-height: 1.5; }
    </style>
</head>

            style: function(feature) {

                if (feature.properties) {
                    var id = feature.properties.id || "";
                    var name = feature.properties.FIRname || "";
                    if (id === "OIIX" || name.indexOf("Tehran") !== -1) {
                        isIran = true;
                    }
                }
                return {
                    color: "#0055ff", 
                    weight: 2, 
                    fillOpacity: isIran ? 0.1 : 0.0
                };
            }
        }).addTo(map);

                        });
                        
                        marker.bindTooltip(plane.callsign, {direction: 'top', className: 'plane-tooltip'});
                        marker.bindPopup(popup);
                        marker.addTo(planeLayerGroup);
                    });
                    
                    airlineList.innerHTML = "";
                    Array.from(airlines).sort().forEach(airline => {
                        if(airline && airline !== "Unknown") {
                            let li = document.createElement("li");
                            li.innerText = airline;
                            airlineList.appendChild(li);
                        }
                    });
                    
                    loading.style.display = "none";
                }, 50);
            }
            
            renderPlanes(slider.value);
            
            slider.addEventListener("input", function() {
                renderPlanes(this.value);
            });
            
        } else {
            banner.innerText = "No temporal data available yet.";
            loading.style.display = "none";
        }

    </script>
</body>
</html>
